version: '3.8'

services:
  aess-chat-bus:
    build: .
    container_name: aess-m2m-bus
    restart: always
    ports:
      - "${BUS_HOST_PORT:-18080}:8080"
    environment:
      - PORT=8080
      - BUS_SECRET_TOKEN=${BUS_SECRET_TOKEN:-}
      - MAX_ROOM_CLIENTS=${MAX_ROOM_CLIENTS:-2}
      - TRAFFIC_LOG_INTERVAL=${TRAFFIC_LOG_INTERVAL:-10000}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
